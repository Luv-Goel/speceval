site_name: SpecEval
site_description: Reproducible evaluation specifications for AI systems
site_url: https://speceval.dev

repo_name: Luv-Goel/speceval
repo_url: https://github.com/Luv-Goel/speceval

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
  features:
    - navigation.instant
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Luv-Goel/speceval
